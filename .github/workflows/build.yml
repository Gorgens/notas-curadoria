name: Build Index

on:
  push:
    branches:
      - main
    paths:
      - 'AEA/**'
      - 'MAN/**'
      - 'NAT/**'
      - 'OPT/**'
      - 'scripts/**'
      - 'assets/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Index
        run: python scripts/generate.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          if [ -n "$(git status --porcelain index.html)" ]; then
            git commit -m "Auto-update index.html [skip ci]"
            git push
          else
            echo "No changes in index.html, skipping commit/push."
          fi
